<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light d-flex justify-content-center align-items-center" style="height:100vh;">
    <div <div class="card shadow-lg p-4 rounded-4">
        <h3 class="text-center mb-3">Login</h3> {% if error %}<p class="text-danger">{{ error }}</p>{% endif %} <form
            method="POST"> <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
            <input type="password" name="password" placeholder="Password" class="form-control mb-3" required> <button
                class="btn btn-primary w-100">Login</button> </form>
    </div>
</body>
</html>
