<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background: #4e54c8;
            color: white;
        }

        .btn-custom:hover {
            background: #3b40a4;
            color: white;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="text-center mb-4">
        <h1 class="text-white">🎓 Student Request Portal</h1>
        <p class="text-white">Submit and track your component requests</p>
    </div>

    <div class="row justify-content-center">

        <!-- FORM -->
        <div class="col-md-6">
            <div class="card p-4">

                <h4 class="mb-3 text-center">Submit Request</h4>

                <form action="/submit_request" method="POST">

                    <input type="text" name="name" class="form-control mb-3" placeholder="Your Name" required>

                    <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

                    <input type="text" name="class" class="form-control mb-3" placeholder="Class" required>

                    <input type="text" name="component" class="form-control mb-3" placeholder="Component Name" required>

                    <textarea name="purpose" class="form-control mb-3" placeholder="Purpose" required></textarea>

                    <button type="submit" class="btn btn-custom w-100">Submit Request</button>

                </form>

            </div>
        </div>

        <!-- VIEW REQUEST (FIXED SECTION) -->
        <div class="col-md-6 mt-4 mt-md-0">
            <div class="card p-4">

                <h4 class="mb-3 text-center">Check Requests</h4>

                <!-- FIXED FORM -->
                <form onsubmit="redirectToRequests(event)">

                    <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email" required>

                    <button class="btn btn-success w-100">View My Requests</button>

                </form>

            </div>
        </div>

    </div>

</div>

<!-- JS FIX -->
<script>
function redirectToRequests(event) {
    event.preventDefault();
    let email = document.getElementById("email").value;
    window.location.href = "/my_requests/" + email;
}
</script>

</body>
</html>
